<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IPTV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #app { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
  video { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; }

  /* SIDEBAR */
  #sidebar {
    position: fixed; top: 0; left: 0; width: 300px; height: 100%;
    background: rgba(0,0,0,0.93); border-right: 1px solid #222;
    transform: translateX(-100%); transition: transform 0.25s ease;
    z-index: 100; display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
  }
  #sidebar-title { font-size: 10px; letter-spacing: 0.2em; color: #555; text-transform: uppercase; }
  #gear-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: #111; border: 1px solid #2a2a2a; color: #666; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #gear-btn:active { background: #1a1a1a; color: #aaa; }
  #search-wrap { padding: 8px 12px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
  #search-input {
    width: 100%; background: #111; border: 1px solid #222; border-radius: 4px;
    color: #ddd; font-size: 13px; padding: 7px 10px; outline: none; font-family: inherit;
  }
  #search-input::placeholder { color: #444; }
  #search-input:focus { border-color: #444; }
  #channel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #channel-list::-webkit-scrollbar { width: 3px; }
  #channel-list::-webkit-scrollbar-track { background: #111; }
  #channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .channel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #0f0f0f; user-select: none;
  }
  .channel-item:active { background: #1a1a1a; }
  .channel-item.active { background: #1c1c1c; border-left: 3px solid #e50914; }
  .channel-item.active .ch-name { color: #fff; }
  .ch-logo { width: 32px; height: 22px; object-fit: contain; flex-shrink: 0; border-radius: 2px; background: #111; }
  .ch-logo-placeholder {
    width: 32px; height: 22px; background: #1a1a1a; border-radius: 2px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 8px; color: #333;
  }
  .ch-name { font-size: 13px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .ch-group { font-size: 10px; color: #444; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #empty-msg { padding: 24px 16px; text-align: center; color: #444; font-size: 12px; line-height: 1.8; }

  /* TOUCH ZONE */
  #touch-zone { position: fixed; top: 0; left: 0; width: 80px; height: 100%; z-index: 50; }

  /* STATUS */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    pointer-events: none; z-index: 10; display: flex; justify-content: space-between; align-items: flex-end;
  }
  #now-playing { color: #aaa; font-size: 11px; letter-spacing: 0.05em; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #ch-count { color: #555; font-size: 10px; }

  /* HINT */
  #hint {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #2a2a2a; font-size: 13px; letter-spacing: 0.05em; pointer-events: none; z-index: 5; line-height: 2.2;
  }
  #hint.hidden { display: none; }

  /* SPINNER */
  #spinner { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 20; pointer-events: none; }
  .spin { width: 32px; height: 32px; border: 2px solid #222; border-top-color: #e50914; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* OVERLAY */
  #overlay-close { position: fixed; top: 0; left: 300px; right: 0; bottom: 0; z-index: 99; display: none; }
  #sidebar.open ~ #overlay-close { display: block; }

  /* MODAL */
  #modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
    padding: 24px 20px; width: 320px; max-width: 90vw;
  }
  #modal h2 { font-size: 10px; letter-spacing: 0.2em; color: #555; text-transform: uppercase; margin-bottom: 18px; font-weight: normal; }
  .modal-btn {
    display: block; width: 100%; padding: 13px 16px;
    background: #1a1a1a; border: 1px solid #252525; border-radius: 7px;
    color: #ccc; font-size: 14px; text-align: left; cursor: pointer;
    font-family: inherit; margin-bottom: 8px;
  }
  .modal-btn:active { background: #222; }
  .modal-btn .sub { display: block; font-size: 10px; color: #555; margin-top: 3px; letter-spacing: 0.02em; }
  #modal-url-form { display: none; margin-top: 14px; }
  #modal-url-form.show { display: block; }
  #modal-url-input {
    width: 100%; background: #0d0d0d; border: 1px solid #333; border-radius: 6px;
    color: #eee; font-size: 13px; padding: 10px 12px; outline: none; font-family: inherit; margin-bottom: 8px;
  }
  #modal-url-input::placeholder { color: #444; }
  #modal-url-input:focus { border-color: #555; }
  #modal-url-go {
    width: 100%; padding: 11px; background: #c0392b; border: none; border-radius: 6px;
    color: #fff; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  #modal-url-go:active { background: #a93226; }
  #modal-cancel {
    display: block; width: 100%; padding: 11px; margin-top: 12px;
    background: transparent; border: 1px solid #222; border-radius: 6px;
    color: #555; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center;
  }
  #modal-cancel:active { color: #888; }
  #file-input { display: none; }
</style>
</head>
<body>

<div id="app">
  <video id="player" autoplay playsinline webkit-playsinline></video>
</div>

<div id="spinner"><div class="spin"></div></div>

<div id="hint">
  <div>← тап слева — каналы</div>
  <div>⚙ в шапке — настройки</div>
</div>

<div id="status-bar">
  <div id="now-playing"></div>
  <div id="ch-count"></div>
</div>

<div id="touch-zone"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">Каналы</div>
    <button id="gear-btn">⚙</button>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="search" placeholder="Поиск…" autocomplete="off">
  </div>
  <div id="channel-list"><div id="empty-msg">Загрузи плейлист через ⚙</div></div>
</div>

<div id="overlay-close"></div>

<div id="modal-bg">
  <div id="modal">
    <h2>Настройки плейлиста</h2>

    <button class="modal-btn" id="btn-url">
      Указать ссылку
      <span class="sub">Загрузить M3U по URL из интернета</span>
    </button>

    <button class="modal-btn" id="btn-file">
      Открыть файл
      <span class="sub">M3U с памяти планшета</span>
    </button>

    <button class="modal-btn" id="btn-save">
      Сохранить плейлист
      <span class="sub">Скачать текущий M3U на планшет</span>
    </button>

    <div id="modal-url-form">
      <input id="modal-url-input" type="url" placeholder="http://…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="modal-url-go">Загрузить</button>
    </div>

    <button id="modal-cancel">Закрыть</button>
  </div>
</div>

<input id="file-input" type="file" accept=".m3u,.m3u8,text/plain">

<script>
(function() {
  var sidebar      = document.getElementById('sidebar');
  var touchZone    = document.getElementById('touch-zone');
  var overlayClose = document.getElementById('overlay-close');
  var channelList  = document.getElementById('channel-list');
  var searchInput  = document.getElementById('search-input');
  var player       = document.getElementById('player');
  var nowPlaying   = document.getElementById('now-playing');
  var chCount      = document.getElementById('ch-count');
  var hint         = document.getElementById('hint');
  var spinner      = document.getElementById('spinner');
  var gearBtn      = document.getElementById('gear-btn');
  var modalBg      = document.getElementById('modal-bg');
  var modalCancel  = document.getElementById('modal-cancel');
  var btnUrl       = document.getElementById('btn-url');
  var btnFile      = document.getElementById('btn-file');
  var btnSave      = document.getElementById('btn-save');
  var urlForm      = document.getElementById('modal-url-form');
  var urlInput     = document.getElementById('modal-url-input');
  var urlGo        = document.getElementById('modal-url-go');
  var fileInput    = document.getElementById('file-input');

  var channels    = [];
  var filtered    = [];
  var activeIndex = -1;
  var hideTimer   = null;
  var hlsInstance = null;
  var rawM3U      = '';

  // SIDEBAR
  function openSidebar() {
    sidebar.classList.add('open');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(closeSidebar, 5000);
  }
  function closeSidebar() { sidebar.classList.remove('open'); clearTimeout(hideTimer); }

  touchZone.addEventListener('touchstart', function(e) { openSidebar(); e.preventDefault(); }, { passive: false });
  touchZone.addEventListener('click', openSidebar);
  overlayClose.addEventListener('click', closeSidebar);
  searchInput.addEventListener('focus', function() { clearTimeout(hideTimer); });
  searchInput.addEventListener('blur', function() { hideTimer = setTimeout(closeSidebar, 5000); });

  // MODAL
  function openModal() {
    urlForm.classList.remove('show');
    modalBg.classList.add('open');
    closeSidebar();
  }
  function closeModal() { modalBg.classList.remove('open'); }

  gearBtn.addEventListener('click', openModal);
  modalCancel.addEventListener('click', closeModal);
  modalBg.addEventListener('click', function(e) { if (e.target === modalBg) closeModal(); });

  btnUrl.addEventListener('click', function() {
    urlForm.classList.toggle('show');
    if (urlForm.classList.contains('show')) setTimeout(function() { urlInput.focus(); }, 100);
  });

  urlGo.addEventListener('click', function() {
    var url = urlInput.value.trim();
    if (!url) return;
    try { localStorage.setItem('iptv_playlist_url', url); } catch(e) {}
    closeModal();
    fetchPlaylist(url);
  });
  urlInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') urlGo.click(); });

  btnFile.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) { rawM3U = e.target.result; closeModal(); loadChannels(rawM3U); };
    reader.readAsText(file, 'UTF-8');
    this.value = '';
  });

  btnSave.addEventListener('click', function() {
    if (!rawM3U) { alert('Плейлист не загружен'); return; }
    var blob = new Blob([rawM3U], { type: 'audio/x-mpegurl' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = 'playlist.m3u'; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
    closeModal();
  });

  // PARSE M3U
  function parseM3U(text) {
    var lines = text.split(/\r?\n/), result = [], current = null;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.startsWith('#EXTINF')) {
        current = { name: '', logo: '', group: '', url: '' };
        var m = line.match(/,(.+)$/); if (m) current.name = m[1].trim();
        m = line.match(/tvg-logo="([^"]*)"/); if (m) current.logo = m[1];
        m = line.match(/group-title="([^"]*)"/); if (m) current.group = m[1];
      } else if (line && !line.startsWith('#') && current) {
        current.url = line; result.push(current); current = null;
      }
    }
    return result;
  }

  function loadChannels(text) {
    rawM3U = text;
    channels = parseM3U(text);
    filtered = channels.slice();
    searchInput.value = '';
    renderList();
    chCount.textContent = channels.length + ' каналов';
    try { localStorage.setItem('iptv_channels', JSON.stringify(channels)); } catch(e) {}
    if (channels.length > 0) playChannel(0);
  }

  // RENDER
  function renderList() {
    if (!filtered.length) { channelList.innerHTML = '<div id="empty-msg">Ничего не найдено</div>'; return; }
    var html = '';
    for (var i = 0; i < filtered.length; i++) {
      var ch = filtered[i], isActive = channels.indexOf(ch) === activeIndex;
      var logo = ch.logo ? '<img class="ch-logo" src="' + ch.logo + '" onerror="this.style.display=\'none\'">' : '<div class="ch-logo-placeholder">TV</div>';
      html += '<div class="channel-item' + (isActive ? ' active' : '') + '" data-idx="' + i + '">'
        + logo + '<div style="min-width:0"><div class="ch-name">' + esc(ch.name) + '</div>'
        + (ch.group ? '<div class="ch-group">' + esc(ch.group) + '</div>' : '') + '</div></div>';
    }
    channelList.innerHTML = html;
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  channelList.addEventListener('click', function(e) {
    var item = e.target.closest('.channel-item');
    if (!item) return;
    playChannel(channels.indexOf(filtered[parseInt(item.getAttribute('data-idx'))]));
    clearTimeout(hideTimer);
    hideTimer = setTimeout(closeSidebar, 3000);
  });

  // CHANNEL SWITCH
  function nextChannel() { if (channels.length) playChannel((activeIndex + 1) % channels.length); }
  function prevChannel() { if (channels.length) playChannel((activeIndex - 1 + channels.length) % channels.length); }

  // SWIPE
  var sy = 0, sx = 0, st = 0;
  document.addEventListener('touchstart', function(e) {
    if (sidebar.classList.contains('open') || modalBg.classList.contains('open')) return;
    sy = e.touches[0].clientY; sx = e.touches[0].clientX; st = Date.now();
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    if (sidebar.classList.contains('open') || modalBg.classList.contains('open')) return;
    var dy = sy - e.changedTouches[0].clientY, dx = Math.abs(sx - e.changedTouches[0].clientX);
    if (Math.abs(dy) > 60 && Date.now() - st < 600 && dx < Math.abs(dy)) {
      if (dy > 0) nextChannel(); else prevChannel();
    }
  }, { passive: true });

  // KEYS
  document.addEventListener('keydown', function(e) {
    switch(e.keyCode) {
      case 38: case 33: prevChannel(); break;
      case 40: case 34: nextChannel(); break;
      case 37: prevChannel(); break;
      case 39: nextChannel(); break;
      case 166: case 8: e.preventDefault(); prevChannel(); break;
      case 167: nextChannel(); break;
    }
  });

  // PLAY
  function playChannel(idx) {
    if (idx < 0 || idx >= channels.length) return;
    activeIndex = idx;
    try { localStorage.setItem('iptv_last_idx', idx); } catch(e) {}
    var ch = channels[idx];
    nowPlaying.textContent = ch.name;
    hint.classList.add('hidden');
    spinner.style.display = 'flex';
    renderList();

    if (hlsInstance) { try { hlsInstance.destroy(); } catch(e){} hlsInstance = null; }
    player.removeAttribute('src');
    player.load();

    var url = ch.url;
    var isHLS = url.indexOf('.m3u8') !== -1 || url.indexOf('.m3u') !== -1;
    var canNative = player.canPlayType('application/vnd.apple.mpegurl') || player.canPlayType('application/x-mpegurl');

    if (isHLS && !canNative && typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: false, lowLatencyMode: true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(player);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { player.play(); spinner.style.display = 'none'; });
      hlsInstance.on(Hls.Events.ERROR, function(e, d) { if (d.fatal) { spinner.style.display = 'none'; nowPlaying.textContent += ' [ошибка]'; }});
    } else {
      player.src = url;
      player.play().catch(function(){});
    }
  }

  player.addEventListener('playing', function() { spinner.style.display = 'none'; });
  player.addEventListener('waiting', function() { spinner.style.display = 'flex'; });
  player.addEventListener('error',   function() { spinner.style.display = 'none'; });

  // SEARCH
  searchInput.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    filtered = q ? channels.filter(function(c) { return c.name.toLowerCase().indexOf(q) !== -1 || c.group.toLowerCase().indexOf(q) !== -1; }) : channels.slice();
    renderList();
  });

  // FETCH
  function fetchPlaylist(url) {
    spinner.style.display = 'flex';
    fetch(url)
      .then(function(r) { if (!r.ok) throw 0; return r.text(); })
      .then(function(t) { spinner.style.display = 'none'; loadChannels(t); })
      .catch(function() {
        fetch('https://corsproxy.io/?' + encodeURIComponent(url))
          .then(function(r) { return r.text(); })
          .then(function(t) { spinner.style.display = 'none'; loadChannels(t); })
          .catch(function() { spinner.style.display = 'none'; alert('Не удалось загрузить. Попробуй файл.'); });
      });
  }

  // FULLSCREEN
  function tryFullscreen() {
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) { try { req.call(el); } catch(e) {} }
    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){});
  }
  setInterval(function() { if (!document.fullscreenElement && !document.webkitFullscreenElement) tryFullscreen(); }, 2000);
  document.addEventListener('touchstart', function() { tryFullscreen(); }, { once: true, passive: true });

  // HLS.JS
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js';
  s.async = true; document.head.appendChild(s);

  // RESTORE
  try {
    var savedUrl = localStorage.getItem('iptv_playlist_url');
    if (savedUrl) urlInput.value = savedUrl;
    var savedCh = localStorage.getItem('iptv_channels');
    if (savedCh) {
      channels = JSON.parse(savedCh);
      filtered = channels.slice();
      renderList();
      chCount.textContent = channels.length + ' каналов';
      hint.classList.add('hidden');
      var lastIdx = parseInt(localStorage.getItem('iptv_last_idx') || '0');
      activeIndex = lastIdx < channels.length ? lastIdx : 0;
      if (channels.length > 0) playChannel(activeIndex);
    }
  } catch(e) {}

})();
</script>
</body>
</html>
